name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Aot — traces conversations, LLM calls, and tool usage. Opt-in via `aot plugins enable observability/langfuse` (or check the box in `aot plugins`)."
author: NousResearch
requires_env:
  - AOT_LANGFUSE_PUBLIC_KEY
  - AOT_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
